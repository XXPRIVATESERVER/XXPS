<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XX Private Server — Growtopia</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:        #04070d;
    --deep:        #071227;
    --navy:        #0d2246;
    --steel:       #16407a;
    --glow:        #6fb2ff;
    --glow-hot:    #bfe0ff;
    --ink:         #eaf2ff;
    --ink-dim:     #93a8c9;
    --line:        rgba(111,178,255,0.16);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background:
      radial-gradient(ellipse 900px 600px at 50% 0%, rgba(30,80,160,0.35), transparent 60%),
      radial-gradient(ellipse 1200px 800px at 80% 100%, rgba(15,50,110,0.35), transparent 60%),
      linear-gradient(180deg, var(--void) 0%, var(--deep) 45%, var(--void) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ambient crossing light streaks, echoing the mark's diagonals */
  .streaks{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }
  .streaks span{
    position: absolute;
    width: 1px;
    height: 160%;
    top: -30%;
    background: linear-gradient(180deg, transparent, rgba(111,178,255,0.35), transparent);
    transform-origin: top center;
    animation: drift 14s ease-in-out infinite;
  }
  .streaks span:nth-child(1){ left: 12%; transform: rotate(18deg); animation-delay: 0s; }
  .streaks span:nth-child(2){ left: 34%; transform: rotate(18deg); animation-delay: -3s; opacity:0.6;}
  .streaks span:nth-child(3){ left: 68%; transform: rotate(-18deg); animation-delay: -6s; }
  .streaks span:nth-child(4){ left: 85%; transform: rotate(-18deg); animation-delay: -9s; opacity:0.6;}
  @keyframes drift{
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.55; }
  }

  @media (prefers-reduced-motion: reduce){
    .streaks span{ animation: none; opacity: 0.25; }
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* ---------- top bar ---------- */
  header{
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px clamp(20px, 5vw, 56px);
    backdrop-filter: blur(10px);
    background: linear-gradient(180deg, rgba(4,7,13,0.75), rgba(4,7,13,0));
  }

  .brand{
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    letter-spacing: 0.12em;
    font-size: 0.9rem;
    color: var(--ink);
  }
  .brand img{ height: 30px; width: 30px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(111,178,255,0.55)); }
  .brand small{ display:block; font-family:'Rajdhani',sans-serif; font-weight:500; letter-spacing:0.2em; font-size:0.62rem; color: var(--ink-dim); margin-top:2px; }

  .discord-btn{
    --size: 44px;
    width: var(--size);
    height: var(--size);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(13,34,70,0.55);
    color: var(--glow-hot);
    text-decoration: none;
    position: relative;
    transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .discord-btn svg{ width: 20px; height: 20px; fill: currentColor; }
  .discord-btn:hover{
    transform: translateY(-2px);
    border-color: var(--glow);
    box-shadow: 0 0 22px rgba(111,178,255,0.45);
  }
  .discord-btn::after{
    content: "Join Discord";
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    white-space: nowrap;
    background: var(--navy);
    border: 1px solid var(--line);
    padding: 5px 10px;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
  }
  .discord-btn:hover::after{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- hero ---------- */
  main{ position: relative; z-index: 1; }

  .hero{
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: clamp(20px, 6vh, 60px) 20px 40px;
  }

  .mark{
    width: min(340px, 62vw);
    filter: drop-shadow(0 0 46px rgba(111,178,255,0.35));
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float{
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .eyebrow{
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.42em;
    color: var(--glow);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .tagline{
    max-width: 520px;
    color: var(--ink-dim);
    font-weight: 500;
    font-size: 1.05rem;
    margin-top: 14px;
    line-height: 1.6;
  }

  /* ---------- status / player count ---------- */
  .status-row{
    margin-top: 34px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }

  .pill{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(9,22,46,0.6);
    backdrop-filter: blur(6px);
  }

  .dot{
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #58e39e;
    box-shadow: 0 0 10px #58e39e;
    animation: pulse 1.8s ease-in-out infinite;
  }
  .dot.offline{ background:#e35858; box-shadow: 0 0 10px #e35858; animation:none; }
  @keyframes pulse{
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.8); }
  }

  .pill .count{
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--glow-hot);
    letter-spacing: 0.03em;
  }
  .pill .label{
    font-size: 0.8rem;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
  }

  /* ---------- footer ---------- */
  footer{
    text-align: center;
    padding: 40px 20px 30px;
    color: var(--ink-dim);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    position: relative;
    z-index: 1;
  }
  footer a{ color: var(--glow); text-decoration: none; }

  @media (max-width: 480px){
    .brand small{ display:none; }
  }
</style>
</head>
<body>

<div class="streaks" aria-hidden="true">
  <span></span><span></span><span></span><span></span>
</div>

<header>
  <div class="brand">
    <img src="logo.png" alt="XX Private Server mark">
    <div>
      XX
      <small>PRIVATE&nbsp;SERVER</small>
    </div>
  </div>

  <a class="discord-btn" href="https://discord.gg/dQyCBk3TZm" target="_blank" rel="noopener" aria-label="Join our Discord">
    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
  </a>
</header>

<main>
  <section class="hero">
    <img class="mark" src="logo.png" alt="XX Private Server">

    <p class="eyebrow">Growtopia Private Server</p>
    <p class="tagline">
      A custom-built world with its own economy, events, and community —
      running on our own rules.
    </p>

    <div class="status-row">
      <div class="pill">
        <span id="statusDot" class="dot"></span>
        <span id="playerCount" class="count">—</span>
        <span class="label" id="playerLabel">players online</span>
      </div>
    </div>
  </section>
</main>

<footer>
  XX PRIVATE SERVER &nbsp;·&nbsp; not affiliated with Growtopia or Ubisoft &nbsp;·&nbsp;
  <a href="https://discord.gg/dQyCBk3TZm" target="_blank" rel="noopener">discord.gg/dQyCBk3TZm</a>
</footer>

<script>
  /*
    ── PLAYER COUNT WIRING ──────────────────────────────────────────
    Point this at an endpoint that returns JSON like: { "online": 42 }
    See the chat reply for the three ways to get that endpoint set up.
  */
  const PLAYER_COUNT_API = "https://example.com/api/players"; // <-- replace me
  const POLL_INTERVAL_MS = 30000;

  const countEl = document.getElementById('playerCount');
  const dotEl   = document.getElementById('statusDot');
  const labelEl = document.getElementById('playerLabel');

  async function fetchPlayerCount(){
    try{
      const res = await fetch(PLAYER_COUNT_API, { cache: "no-store" });
      if(!res.ok) throw new Error("bad response");
      const data = await res.json();
      const online = data.online ?? data.count ?? data.players;
      if(typeof online !== "number") throw new Error("no count in response");

      countEl.textContent = online;
      labelEl.textContent = online === 1 ? "player online" : "players online";
      dotEl.classList.remove('offline');
    }catch(err){
      countEl.textContent = "?";
      labelEl.textContent = "count unavailable";
      dotEl.classList.add('offline');
    }
  }

  fetchPlayerCount();
  setInterval(fetchPlayerCount, POLL_INTERVAL_MS);
</script>

</body>
</html>
